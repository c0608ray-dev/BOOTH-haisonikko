<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>配送日報</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1208">
<link rel="icon" id="pwa-favicon">
<link rel="manifest" id="pwa-manifest">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1208; color: #f0e6cc; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; -webkit-user-select: none; user-select: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
button, input, textarea, select { font-family: inherit; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input, textarea, select { -webkit-user-select: text; user-select: text; }

.header { background: #221a08; border-bottom: 3px solid #e8920a; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-sub { font-size: 11px; color: #c47a20; letter-spacing: 3px; font-weight: bold; }
.header-title { font-size: 18px; font-weight: bold; color: #ffd166; letter-spacing: 1px; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn { background: transparent; color: #c47a20; border: 1px solid #8a5010; border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; font-weight: bold; }
.tab-btn.active { background: #e8920a; color: #1a1208; border-color: #e8920a; }

.content { padding: 12px 20px 60px; max-width: 480px; margin: 0 auto; }
.sec-lbl { font-size: 11px; color: #c47a20; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; margin-top: 20px; font-weight: bold; }
.fld-lbl { font-size: 11px; color: #a06030; margin-bottom: 4px; }
.inp { width: 100%; background: #241808; border: 1px solid #5a3a10; border-radius: 8px; color: #f0e6cc; padding: 10px 12px; font-size: 15px; outline: none; }
.inp:focus { border-color: #e8920a; box-shadow: 0 0 0 2px rgba(232,146,10,0.15); }
.sel { width: 100%; background: #241808; border: 1px solid #5a3a10; border-radius: 8px; color: #f0e6cc; padding: 10px 12px; font-size: 15px; outline: none; appearance: none; }
.sel:focus { border-color: #e8920a; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.g2s { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.info-box { background: #2d1e06; border: 1px solid #e8920a; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.info-lbl { font-size: 12px; color: #c47a20; }
.info-val { font-size: 16px; color: #ffd166; font-weight: bold; }

.save-btn { width: 100%; background: linear-gradient(135deg, #e8920a, #f5b842); color: #1a1208; border: none; border-radius: 10px; padding: 16px; font-size: 16px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 16px; box-shadow: 0 4px 12px rgba(232,146,10,0.3); }
.save-btn.saved { background: #a06030; color: #f0e6cc; box-shadow: none; }
.export-btn { width: 100%; background: transparent; color: #ffd166; border: 1px solid #8a5010; border-radius: 8px; padding: 12px; font-size: 14px; cursor: pointer; letter-spacing: 1px; margin-bottom: 8px; }

.sync-box { background: #241808; border: 1px solid #5a3a10; border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
.sync-title { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; }
.sync-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sync-btn { border-radius: 8px; padding: 12px 8px; font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 1px; text-align: center; }
.sync-export { background: transparent; color: #ffd166; border: 1px solid #8a5010; }
.sync-import { background: transparent; color: #a0b8f0; border: 1px solid #3a5a8f; }
.sync-note { font-size: 11px; color: #7a5030; margin-top: 8px; line-height: 1.6; }
.sync-flash { font-size: 12px; color: #ffd166; text-align: center; margin-top: 8px; min-height: 16px; }

.banner { border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.banner-warn { background: #2d1e06; border: 1px solid #e8920a; }
.banner-over { background: #2d0808; border: 1px solid #cc3333; }
.banner-info { background: #0f1e2a; border: 1px solid #3a5a8f; }
.banner-txt-warn { font-size: 13px; font-weight: bold; color: #ffd166; }
.banner-txt-over { font-size: 13px; font-weight: bold; color: #ff6b6b; }
.banner-txt-info { font-size: 13px; font-weight: bold; color: #a0b8f0; }
.banner-sub { font-size: 11px; color: #8a6030; margin-top: 2px; }

.card { background: #221608; border: 1px solid #5a3a10; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.card.editing { border-color: #e8920a; box-shadow: 0 0 0 2px rgba(232,146,10,0.15); }
.card-date { font-size: 15px; font-weight: bold; color: #ffd166; }
.card-grid { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 13px; color: #c09060; }
.card-hi { color: #ffd166; font-weight: bold; }
.card-memo { margin-top: 8px; font-size: 12px; color: #8a6030; border-top: 1px solid #3a2008; padding-top: 8px; }
.edit-btn { background: transparent; border: none; color: #c47a20; cursor: pointer; font-size: 14px; padding: 0; }
.del-btn { background: transparent; border: none; color: #8a3030; cursor: pointer; font-size: 16px; padding: 0; }

.summary { margin-top: 24px; background: #241808; border: 1px solid #5a3a10; border-radius: 10px; padding: 14px; }
.sum-lbl { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; }
.sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; font-size: 13px; }

.oil-card { border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.pb-bg { background: #1a1208; border-radius: 4px; height: 8px; margin-bottom: 12px; overflow: hidden; }
.pb-fill { height: 100%; border-radius: 4px; }
.oil-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
.oil-hint { background: #241808; border: 1px solid #5a3a10; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #8a6030; line-height: 1.7; margin-top: 16px; }
.oil-save-btn { width: 100%; background: linear-gradient(135deg, #e8920a, #f5b842); color: #1a1208; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 16px; }

.cancel-btn { background: transparent; color: #c09060; border: 1px solid #5a3a10; border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; width: 100%; }
.ok-btn { background: #e8920a; color: #1a1208; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; }
.hint-sm { font-size: 11px; color: #8a6030; margin-top: 4px; }

.prev-fuel { font-size: 11px; color: #8a6030; margin-top: 6px; }

.sum-month-card { background: #221608; border: 1px solid #5a3a10; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
.sum-month-card.current { border-color: #e8920a; box-shadow: 0 0 0 1px rgba(232,146,10,0.2); }
.sum-month-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.sum-month-lbl { font-size: 15px; font-weight: bold; color: #ffd166; }
.sum-month-badge { font-size: 10px; color: #e8920a; border: 1px solid #e8920a; border-radius: 4px; padding: 2px 6px; font-weight: bold; }
.sum-kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sum-kpi { background: #1a1208; border-radius: 8px; padding: 10px 12px; }
.sum-kpi-lbl { font-size: 10px; color: #a06030; margin-bottom: 4px; letter-spacing: 1px; }
.sum-kpi-val { font-size: 18px; font-weight: bold; color: #f0e6cc; }
.sum-kpi-val.hi { color: #ffd166; }
.sum-kpi-unit { font-size: 11px; color: #a06030; margin-left: 2px; }
.sum-empty { text-align: center; color: #7a5030; padding: 40px 0; font-size: 14px; }

.veh-card { border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #5a3a10; background: #221608; }
.veh-card.alert-warn { border-color: #e8920a; background: #2d1e06; }
.veh-card.alert-over { border-color: #cc3333; background: #2d0808; }
.veh-card.alert-ok   { border-color: #5a3a10; background: #221608; }
.veh-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.veh-name { font-size: 14px; font-weight: bold; color: #f0e6cc; }
.veh-info { font-size: 12px; color: #c09060; margin-bottom: 2px; }
.veh-days { font-size: 20px; font-weight: bold; margin: 6px 0; }
.veh-days.warn { color: #ffd166; }
.veh-days.over { color: #ff6b6b; }
.veh-days.ok   { color: #f5b842; }
.veh-pb-bg { background: #1a1208; border-radius: 4px; height: 6px; margin: 8px 0; overflow: hidden; }
.veh-pb-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.veh-form { background: #1a1208; border: 1px solid #5a3a10; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.veh-form-title { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; }
.veh-del-btn { background: transparent; border: none; color: #8a3030; cursor: pointer; font-size: 14px; padding: 0; }
.veh-add-btn { width: 100%; background: transparent; color: #ffd166; border: 1px solid #8a5010; border-radius: 8px; padding: 12px; font-size: 13px; cursor: pointer; margin-top: 4px; font-family: inherit; }
.veh-edit-btn { background: transparent; border: none; color: #c47a20; cursor: pointer; font-size: 13px; padding: 0; font-family: inherit; }


.inv-track { background: #1a1208; border-radius: 6px; padding: 10px 12px; margin-top: 10px; }
.inv-track-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.inv-track-row:last-child { margin-bottom: 0; }
.inv-track-lbl { font-size: 11px; color: #a06030; width: 60px; flex-shrink: 0; }
.inv-track-inp { background: #221608; border: 1px solid #5a3a10; border-radius: 4px; color: #f0e6cc; padding: 4px 8px; font-size: 12px; font-family: inherit; outline: none; flex: 1; }
.inv-track-inp:focus { border-color: #e8920a; }
.inv-track-check { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.inv-track-check input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #e8920a; }
.inv-track-check-lbl { font-size: 12px; color: #f0e6cc; }
.inv-track-check-lbl.confirmed { color: #ffd166; font-weight: bold; }
.inv-track-save { background: #3a2008; color: #ffd166; border: 1px solid #8a5010; border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; }
.inv-track-saved { font-size: 11px; color: #e8920a; margin-left: 4px; }

.inv-month-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 16px; }
.inv-month-row .inp { flex: 1; }
.inv-gen-btn { background: #e8920a; color: #1a1208; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; }
.inv-settings { background: #1a1208; border: 1px solid #5a3a10; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.inv-settings-title { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 12px; font-weight: bold; }
.inv-settings-save { width: 100%; background: #3a2008; color: #ffd166; border: 1px solid #8a5010; border-radius: 6px; padding: 10px; font-size: 13px; cursor: pointer; margin-top: 10px; }
.inv-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.inv-table th { background: #2d1e06; color: #c47a20; padding: 8px 10px; text-align: center; border: 1px solid #5a3a10; font-size: 11px; letter-spacing: 1px; font-weight: bold; }
.inv-table td { padding: 8px 10px; border: 1px solid #3a2a10; color: #f0e6cc; text-align: center; }
.inv-table tr:nth-child(even) td { background: #241808; }
.inv-table .td-left { text-align: left; }
.inv-table .td-amt { color: #ffd166; font-weight: bold; }
.inv-table .td-total { background: #2d1e06 !important; color: #ffd166; font-weight: bold; font-size: 15px; }
.inv-total-box { background: #2d1e06; border: 1px solid #e8920a; border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
.inv-total-lbl { font-size: 13px; color: #c47a20; }
.inv-total-val { font-size: 22px; color: #ffd166; font-weight: bold; }
.inv-print-btn { width: 100%; background: #3a5a8f; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 8px; }

.setup-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 24px 60px; max-width: 480px; margin: 0 auto; }
.setup-logo { font-size: 48px; margin-bottom: 12px; text-align: center; }
.setup-title { font-size: 22px; font-weight: bold; color: #ffd166; letter-spacing: 2px; text-align: center; margin-bottom: 6px; }
.setup-subtitle { font-size: 12px; color: #c47a20; text-align: center; margin-bottom: 32px; line-height: 1.7; }
.setup-section { width: 100%; background: #241808; border: 1px solid #5a3a10; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.setup-section-title { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 14px; font-weight: bold; }
.setup-field { margin-bottom: 12px; }

.setup-start-btn { width: 100%; background: linear-gradient(135deg, #e8920a, #f5b842); color: #1a1208; border: none; border-radius: 10px; padding: 18px; font-size: 17px; font-weight: bold; cursor: pointer; letter-spacing: 3px; margin-top: 8px; }

.settings-box { background: #241808; border: 1px solid #5a3a10; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.settings-box-title { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 14px; font-weight: bold; }
.settings-save-btn { width: 100%; background: linear-gradient(135deg, #e8920a, #f5b842); color: #1a1208; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 4px; }
.settings-flash { font-size: 12px; color: #ffd166; text-align: center; margin-top: 8px; min-height: 16px; }
.settings-danger { background: #1a0808; border: 1px solid #4a2020; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.settings-danger-title { font-size: 11px; color: #8f4040; letter-spacing: 2px; margin-bottom: 10px; }
.settings-reset-btn { width: 100%; background: transparent; color: #8f4040; border: 1px solid #4a2020; border-radius: 8px; padding: 12px; font-size: 13px; cursor: pointer; font-family: inherit; }

.client-card { background: #221608; border: 1px solid #5a3a10; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; }
.client-card-body { flex: 1; }
.client-card-name { font-size: 14px; font-weight: bold; color: #f0e6cc; margin-bottom: 4px; }
.client-card-sub { font-size: 11px; color: #a06030; line-height: 1.7; }

.client-edit-btn { background: transparent; border: none; color: #c47a20; cursor: pointer; font-size: 13px; padding: 0; font-family: inherit; }

.client-form { background: #1a1208; border: 1px solid #e8920a; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.client-form-title { font-size: 11px; color: #c47a20; letter-spacing: 2px; margin-bottom: 12px; font-weight: bold; }
.client-add-btn { width: 100%; background: transparent; color: #ffd166; border: 1px solid #8a5010; border-radius: 8px; padding: 12px; font-size: 13px; cursor: pointer; margin-top: 4px; font-family: inherit; }
.client-card.selected { border-color: #e8920a; background: #2d1e06; }
.client-card-hd { display: flex; justify-content: space-between; align-items: center; }

.time-wrap { display: flex; flex-direction: column; gap: 4px; }

<body>

<div class="header" id="main-header" style="display:none">
  <div>
    <div class="header-sub" id="header-company">配送日報</div>
    <div class="header-title">配送日報</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="form">入力</button>
    <button class="tab-btn" data-tab="list" id="list-btn">履歴</button>
    <button class="tab-btn" data-tab="invoice">🧾請求書</button>
    <button class="tab-btn" data-tab="vehicle">🚗車両</button>
    <button class="tab-btn" data-tab="settings">⚙設定</button>
  </div>
</div>

<div id="app"></div>
<input type="file" id="import-file" accept=".json" style="display:none">

<script>
(function() {

var SK  = 'dr-reports';
var OK  = 'dr-oil';
var DK  = 'dr-draft';
var FK  = 'dr-last-fuel';
var IK  = 'dr-invoice-settings';
var BK  = 'dr-last-backup';
var TK  = 'dr-inv-track';
var VK  = 'dr-vehicle';
var SUK = 'dr-setup-done';
var CK  = 'dr-clients';

function lsGet(k) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch(e) {} }

function today() { return new Date().toISOString().slice(0, 10); }
function thisMonth() { return new Date().toISOString().slice(0, 7); }

// ── 時刻差分の共通関数（日またぎ対応） ──
// 開始〜終了の2時刻(HH:MM)から稼働分数を返す。終了が開始より早い場合は翌日として+24h補正
function diffMin(startTime, endTime) {
  if (!startTime || !endTime) return 0;
  var sp = startTime.split(':'), ep = endTime.split(':');
  if (sp.length !== 2 || ep.length !== 2) return 0;
  var t = (parseInt(ep[0]) * 60 + parseInt(ep[1])) - (parseInt(sp[0]) * 60 + parseInt(sp[1]));
  if (t < 0) t += 24 * 60; // 日またぎ（終了が翌日）
  return t > 0 ? t : 0;
}

// ── レコードID生成（衝突回避） ──
// crypto.randomUUID() を優先使用（iOS Safari 15.4+、Chrome 92+で利用可）
// 古いブラウザ向けにはタイムスタンプ+乱数のフォールバック
function genId() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return Date.now() + '_' + Math.random().toString(36).slice(2, 10);
}

function calcDuration(s, e) {
  var t = diffMin(s, e);
  if (t <= 0) return '';
  return Math.floor(t / 60) + '時間' + String(t % 60).padStart(2, '0') + '分';
}
function calcDistance(s, e) {
  var a = parseFloat(s), b = parseFloat(e);
  if (isNaN(a) || isNaN(b) || b <= a) return '';
  return (b - a).toFixed(1);
}
function calcFuelEff(oFuel, fuel, lf) {

function downloadBlob(content, filename, mimeType) {
  var blob = new Blob([content], { type: mimeType });
  if (navigator.share && navigator.canShare) {
    var file = new File([blob], filename, { type: mimeType });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: filename }).catch(function(){});
      return;
    }
  }
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('import-file').addEventListener('change', function(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.records || !Array.isArray(data.records)) { setSyncFlash('❌ ファイルの形式が正しくありません'); return; }
      var merged = data.records.slice();
      records.forEach(function(r) { if (!merged.find(function(m) { return String(m.id) === String(r.id); })) merged.push(r); });
      merged.sort(function(a, b) { return b.date > a.date ? 1 : b.date < a.date ? -1 : 0; });
      records = merged; lsSet(SK, records);
      if (data.oilData) { oilData = data.oilData; lsSet(OK, oilData); }
      if (data.lastFuel) { lastFuel = data.lastFuel; lsSet(FK, lastFuel); }
      if (data.invSettings) { invSettings = data.invSettings; lsSet(IK, invSettings); }
      if (data.vehicles) lsSet(VK, data.vehicles);
      if (data.invTrack) lsSet(TK, data.invTrack);
      if (data.clients) lsSet(CK, data.clients);
      lsSet(SUK, true); setupDone = true;
      setSyncFlash('✅ インポート完了（' + records.length + '件）');
      updateHeader();
      render();
    } catch(err) { setSyncFlash('❌ 読み込みエラー: ' + err.message); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

function reCalc() {
  var d = calcDuration(form.startTime, form.endTime);
  var e1 = document.getElementById('calc-duration'); if (e1) { e1.querySelector('.info-val').textContent = d; e1.style.display = d ? '' : 'none'; }
  var ds = calcDistance(form.odometerStart, form.odometerEnd);
  var e2 = document.getElementById('calc-distance'); if (e2) { e2.querySelector('.info-val').textContent = (ds || '') + ' km'; e2.style.display = ds ? '' : 'none'; }
  var fe = calcFuelEff(form.odometerFuel, form.fuel, lastFuel);
  var e3 = document.getElementById('calc-fe'); if (e3) { e3.querySelector('.info-val').textContent = (fe || '') + ' km/L'; e3.style.display = fe ? '' : 'none'; }
  // 時間単価クライアント選択中なら開始・終了時刻から金額を自動計算
  if (form.clientId && form.startTime && form.endTime) {
    var rcClients = lsGet(CK) || [];
    var rcCl = rcClients.find(function(c) { return c.id === form.clientId; });
    if (rcCl && rcCl.billingType === 'hourly') {
      var totalMin = diffMin(form.startTime, form.endTime);
      var breakM = parseFloat(rcCl.breakMin) || 60;
      var billMin = Math.max(0, totalMin - breakM);
      var billH = billMin / 60;
      var amt = Math.ceil(billH * (parseFloat(rcCl.hourlyRate) || 3000));
      if (amt > 0) {
        form.itemAmount = String(amt);
        var ai = document.getElementById('form-amt-inp'); if (ai) ai.value = amt;
        var an = document.getElementById('form-amt-note');
        if (an) an.textContent = '⏱ ' + Math.floor(billH) + '時間' + String(billMin % 60).padStart(2,'0') + '分 × ¥' + fmtNum(rcCl.hourlyRate||3000) + '/h = ¥' + fmtNum(amt) + '（自動計算）';
      }
    }
  }
}

function calcSubtotal(recs, cl) {
  var isH = cl && cl.billingType === 'hourly';
  var hr  = isH ? (parseFloat(cl.hourlyRate) || 3000) : 0;
  var bm  = isH ? (parseFloat(cl.breakMin)   || 60)   : 0;
  return recs.reduce(function(sum, r) {
    if (isH && !parseFloat(r.itemAmount)) {
      var tm = diffMin(r.startTime, r.endTime);
      return sum + Math.ceil((Math.max(0, tm - bm) / 60) * hr);
    }
    return sum + (parseFloat(r.itemAmount) || 0);
  }, 0);
}

function buildInvoiceTable(recs, cl, defaultItemName) {
  var isH = cl && cl.billingType === 'hourly';
  var hr  = isH ? (parseFloat(cl.hourlyRate) || 3000) : 0;
  var bm  = isH ? (parseFloat(cl.breakMin)   || 60)   : 0;
  var tbl = el('table', 'inv-table');
  var thead = el('thead'); var hrow = el('tr');
  ['品名','日付','開始','終了','稼働','金額'].forEach(function(h) { hrow.appendChild(el('th','',h)); });
  thead.appendChild(hrow); tbl.appendChild(thead);
  var tbody = el('tbody');
  var subtotal = 0;
  recs.forEach(function(r) {
    var amt;
    if (isH && !parseFloat(r.itemAmount)) {
      var tm = diffMin(r.startTime, r.endTime);
      var bmin = Math.max(0, tm - bm);
      amt = Math.ceil((bmin / 60) * hr);
    } else { amt = parseFloat(r.itemAmount) || 0; }
    subtotal += amt;
    var dDisp = r.duration || '-';
    if (isH && amt) {
      var tm2 = diffMin(r.startTime, r.endTime);
      var bm2 = Math.max(0, tm2 - bm);
      dDisp = (r.duration || '-') + '（請求' + Math.floor(bm2 / 60) + 'h' + String(bm2 % 60).padStart(2, '0') + 'm）';
    }
    var tr = el('tr');
    [r.itemName || defaultItemName, r.date, r.startTime || '-', r.endTime || '-', dDisp, fmtYen(amt)].forEach(function(v, i) {
      tr.appendChild(el('td', i === 5 ? 'td-amt' : (i <= 1 ? 'td-left' : ''), v));
    });
    tbody.appendChild(tr);
  });
  var tr2=el('tr');
  var tc=el('td','td-total'); tc.colSpan=4; tc.textContent='小計'; tr2.appendChild(tc);
  tr2.appendChild(el('td','td-total',recs.length+'日'));
  tr2.appendChild(el('td','td-total td-amt',fmtYen(subtotal)));
  tbody.appendChild(tr2); tbl.appendChild(tbody);
  return tbl;
}

function buildAllClientsSummary(c, clients) {
  var allMonthRecs = records.filter(function(r) { return r.date && r.date.slice(0, 7) === invMonth; });

  clients.forEach(function(cl) {
    var clRecs = allMonthRecs.filter(function(r) { return r.clientId === cl.id; });

      clRecs = allMonthRecs.filter(function(r) { return !r.clientId && (r.itemName||'') === defN; });
    }
    if (!clRecs.length) return;
    var taxRate = parseFloat(cl.taxRate) || 10;
    var subtotal = calcSubtotal(clRecs, cl);

    grandTotal += total;

    c.appendChild(hd);
    var defName2 = cl.itemName || '配送業務委託費';
    c.appendChild(buildInvoiceTable(clRecs, cl, defName2));
    var sbox = el('div'); sbox.style.cssText = 'background:#141c12;border:1px solid #2e4028;border-radius:6px;padding:8px 12px;margin-bottom:4px;display:flex;justify-content:space-between;font-size:12px;color:#6b8f5e;';
    var isH = cl.billingType === 'hourly';

    sbox.appendChild(printBtn2);
    c.appendChild(sbox);
  });
  var unassigned = allMonthRecs.filter(function(r) {
    if (r.clientId) return false;

    return !matchedByName;
  });
  if (unassigned.length) {
    var uhd = el('div', 'sec-lbl'); uhd.style.marginTop = '20px'; uhd.textContent = '📋 取引先未設定';
    c.appendChild(uhd);
    c.appendChild(buildInvoiceTable(unassigned, null, '配送業務委託費'));
    grandTotal += calcSubtotal(unassigned, null);
  }
  var gtBox = el('div', 'inv-total-box'); gtBox.style.marginTop = '16px';
  var gtL = el('div'); gtL.appendChild(el('div','inv-total-lbl', invMonth.replace('-','年') + '月　全取引先合計（税込）'));
  var gtV = el('div'); gtV.appendChild(el('div','inv-total-val', fmtYen(grandTotal)));
  gtBox.appendChild(gtL); gtBox.appendChild(gtV);
  c.appendChild(gtBox);
  var note2 = el('div', 'hint-sm'); note2.style.marginTop = '10px';
  note2.textContent = '※ 各取引先の行の「🖨 印刷」ボタンで個別に請求書を出力できます';

function daysDiff(dateStr) {
  if (!dateStr) return null;
  var target = new Date(dateStr); var now = new Date(); now.setHours(0,0,0,0);
  return Math.round((target - now) / (1000 * 60 * 60 * 24));
}
function alertLevel(days) {
  if (days === null) return 'ok';
  if (days < 0) return 'over';
  if (days <= 30) return 'warn';
  return 'ok';
}

function makeXls(headers, rows, sheetName) {
  var xml = '<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n'
    + '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n'
    + '<Worksheet ss:Name="' + sheetName + '"><Table>\n';
  function cell(v, type) {
    var t = type || (typeof v === 'number' ? 'Number' : 'String');
    var s = v == null ? '' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    return '<Cell><Data ss:Type="' + t + '">' + s + '</Data></Cell>';
  }
  xml += '<Row>' + headers.map(function(h){ return cell(h); }).join('') + '</Row>\n';
  rows.forEach(function(r) {
    xml += '<Row>' + headers.map(function(h){ var v = r[h]; return cell(v === '' || v == null ? '' : v, typeof v === 'number' ? 'Number' : 'String'); }).join('') + '</Row>\n';
  });
  xml += '</Table></Worksheet></Workbook>'; return xml;
}

function downloadXls(xml, filename) {

}

  var manifest = { name: appName, short_name: invSettings.myName || '配送日報', description: '配送日報・請求書・経費管理', start_url: '.', display: 'standalone', orientation: 'portrait', background_color: '#0f1410', theme_color: '#0f1410', icons: [{ src: document.getElementById('pwa-favicon').href, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }] };
  var mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

<script>
// ════════════════════════════════════════════════════════
// haisonikko フロントエンド認証モジュール v2（ES5互換）
// ════════════════════════════════════════════════════════
(function () {
  'use strict';

  var LS_KEY  = 'haisonikko_license';
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxve-YBA-QTAAQgBmm4J3fO2lTSri1HAW1L_xTls2SG_NijlRIKZLYHM6wGHnStOV-bBw/exec';
  // ★ GAS側のスクリプトプロパティに設定した値と同じものを指定
  // （悪意ある第三者が直接GAS URLを叩くのを防ぐ簡易ガード）
  // 十分に長くランダムな文字列（例: openssl rand -hex 32 で生成）を推奨
  var SHARED_SECRET = 'cCy3KsgJ42NXle5SG6V7W98juhZmBz1vox0QnMbtwHdORAPU';

  // ── SHA-256（Web Crypto API、Promise返却） ──
  function sha256(str) {
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
      .then(function(buf) {
        return Array.from(new Uint8Array(buf))
          .map(function(b) { return ('0' + b.toString(16)).slice(-2); })
          .join('');
      });
  }

  // ── デバイスID生成（localStorage保存 + UUIDベース） ──
  // 初回のみランダムIDを生成してlocalStorageに保存。以降は同じIDを返す。
  // ブラウザ自動更新等でuserAgentが変わっても影響を受けない安定した識別子。
  var DEVICE_KEY = 'haisonikko_device_id';
  function getDeviceId() {
    // 既存のデバイスIDがあればそれを使う（再認証時の一貫性確保）
    try {
      var stored = localStorage.getItem(DEVICE_KEY);
      if (stored && stored.indexOf('DEV-') === 0) {
        window._deviceId = stored;
        return stored;
      }
    } catch (e) {}

    // 初回：UUIDベースのランダムIDを生成
    var id;
    if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
      // UUID v4 の英数字部分12文字（48bit相当、衝突確率は事実上ゼロ）
      id = 'DEV-' + crypto.randomUUID().replace(/-/g, '').slice(0, 12).toUpperCase();
    } else {
      // 古いブラウザ向けフォールバック（タイムスタンプ+乱数）
      id = 'DEV-' + (Date.now().toString(36) + Math.random().toString(36).slice(2, 8)).toUpperCase().slice(0, 12);
    }

    try { localStorage.setItem(DEVICE_KEY, id); } catch (e) {}
    window._deviceId = id;
    return id;
  }

  // ── ローカルストレージ ──
  function loadLicense() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || null; } catch (e) { return null; }
  }
  function saveLicense(data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
  }

  // ── サーバー検証 ──
  function validateOnServer(key, deviceId) {
    if (!GAS_URL) return Promise.resolve({ ok: false, code: 'NO_SERVER' });
    var url = GAS_URL
      + '?action=validate'
      + '&key=' + encodeURIComponent(key)
      + '&device=' + encodeURIComponent(deviceId)
      + '&s=' + encodeURIComponent(SHARED_SECRET)  // 共有シークレット（簡易ガード）
      + '&t=' + Date.now();
    return fetch(url).then(function(r) { return r.json(); }).catch(function() { return null; });
  }

  // ── トークン有効期限チェック ──
  function isTokenValid(saved, deviceId) {
    if (!saved || !saved.token || !saved.expiry || !saved.device) return false;
    if (saved.device !== deviceId) return false;
    return Date.now() <= new Date(saved.expiry).getTime() + 30 * 24 * 60 * 60 * 1000;
  }

  // ── 設定タブ: ライセンス情報描画 ──
  // targetElement を渡せば直接そこに描画。省略時は document.getElementById で探す。
  function renderLicenseInfo(key, deviceId, count, targetElement) {
    var box = targetElement || document.getElementById('license-info-box');
    if (!box) return;
    window._licenseDeviceCount = count;
    var countHtml = (count == null)
      ? '<span style="color:#7a5030">（オフライン）</span>'
      : '<span style="color:' + (count >= 3 ? '#ff6b6b' : '#8fcf7a') + ';font-weight:bold;">' + count + '台</span>';
    var warnHtml = (count != null && count >= 3)
      ? '<div style="color:#ff6b6b;font-size:11px;margin-top:6px;">⚠️ 複数台での使用が検出されています。</div>' : '';
    box.innerHTML =
      '<div style="font-size:11px;color:#c47a20;letter-spacing:2px;font-weight:bold;margin-bottom:8px;">🔑 ライセンス情報</div>' +
      '<div style="font-size:12px;display:grid;gap:5px;">' +
        '<div style="color:#a06030;">キー：<span style="color:#f0e6cc;letter-spacing:1px;font-size:11px;">' + key + '</span></div>' +
        '<div style="color:#a06030;">端末ID：<span style="color:#c8d4b8;">' + deviceId + '</span></div>' +
        '<div style="color:#a06030;">使用台数：' + countHtml + '<span style="color:#7a5030;font-size:11px;">（このキーの合計）</span></div>' +
      '</div>' + warnHtml +
      '<button id="lic-reset-btn" ' +
        'style="margin-top:10px;width:100%;background:transparent;border:1px solid #8a5010;' +
        'border-radius:6px;color:#c47a20;padding:6px 12px;font-size:11px;cursor:pointer;">' +
        '🔄 別のキーで再認証</button>';
    // ── 再認証ボタンのクリックハンドラ（インラインonclickのクォート衝突回避） ──
    // ── 再認証ボタンのクリックハンドラ ──
    // box.querySelector を使うことで、boxがまだDOMに追加されていない時でも動作する
    var resetBtn = box.querySelector('#lic-reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('click', function() {
        if (confirm('ライセンスをリセットしますか？')) {
          try { localStorage.removeItem(LS_KEY); } catch (e) {}
          location.reload();
        }
      });
    }
  }
  window.renderLicenseInfo = renderLicenseInfo;

  // ── 認証画面 UI ──
  function showLicenseScreen(onSuccess) {
    var overlay = document.createElement('div');
    overlay.id = 'license-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:#1a1208;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:sans-serif;';
    overlay.innerHTML =
      '<div style="background:#221a08;border:1px solid #e8920a;border-radius:16px;padding:36px 28px;max-width:360px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.6);">' +
        '<div style="text-align:center;margin-bottom:24px;"><div style="font-size:32px;margin-bottom:8px;">🚚</div>' +
          '<div style="font-size:20px;font-weight:bold;color:#ffd166;margin-bottom:4px;">haisonikko</div>' +
          '<div style="font-size:12px;color:#c47a20;letter-spacing:2px;">配送日報管理アプリ</div></div>' +
        '<div style="font-size:13px;color:#a06030;margin-bottom:8px;">シリアルキーを入力してください</div>' +
        '<input id="lic-input" type="text" maxlength="19" placeholder="HISO-XXXX-XXXX-XXXX"' +
          ' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text"' +
          ' style="width:100%;box-sizing:border-box;background:#241808;border:1px solid #5a3a10;border-radius:8px;color:#f0e6cc;padding:12px 14px;font-size:16px;letter-spacing:2px;outline:none;margin-bottom:8px;">' +
        '<div id="lic-err" style="font-size:12px;color:#ff6b6b;min-height:18px;margin-bottom:12px;"></div>' +
        '<button id="lic-btn" style="width:100%;background:linear-gradient(135deg,#e8920a,#f5b842);color:#1a1208;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:2px;">認証する</button>' +
        '<div style="font-size:11px;color:#7a5030;text-align:center;margin-top:16px;">BOOTHで購入したキーを入力してください</div>' +
      '</div>';
    document.body.appendChild(overlay);

    var input = document.getElementById('lic-input');
    var btn   = document.getElementById('lic-btn');
    var err   = document.getElementById('lic-err');

    // ── キー文字列の整形（ハイフン区切り・大文字化） ──
    // iOS Safariで入力中にvalueを書き換えるとIME入力が壊れるため、整形は送信時のみ行う
    function formatKey(rawValue) {
      var raw = (rawValue || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (raw.length > 16) raw = raw.slice(0, 16);
      var fmt = '';
      for (var i = 0; i < raw.length; i++) {
        if (i > 0 && i % 4 === 0) fmt += '-';
        fmt += raw.charAt(i);
      }
      return fmt;
    }

    // 入力中はエラーメッセージのクリアのみ（valueは触らない）
    input.addEventListener('input', function() {
      err.textContent = '';
    });

    btn.addEventListener('click', function() {
      // ボタン押下時に整形（iOS入力を妨害しないため）
      var key = formatKey(input.value);
      input.value = key; // 整形結果を表示に反映
      if (key.replace(/-/g, '').length < 16) {
        err.textContent = '❌ キーの形式が正しくありません（HISO-XXXX-XXXX-XXXX）'; err.style.color = '#ff6b6b'; return;
      }
      err.textContent = '🔄 サーバーで確認中...'; err.style.color = '#c47a20';
      btn.disabled = input.disabled = true;
      validateOnServer(key, getDeviceId()).then(function(result) {
        btn.disabled = input.disabled = false;
        if (!result) {
          err.textContent = '⚠️ サーバーに接続できません。初回認証にはインターネット接続が必要です。';
          err.style.color = '#ff6b6b'; return;
        }
        if (!result.ok) {
          var msgs = { INVALID_KEY:'❌ キーが正しくありません', RATE_LIMITED:'⏳ しばらく待ってから再試行してください', SERVER_ERROR:'❌ サーバーエラー', NO_SERVER:'❌ GAS URLが未設定です', INVALID_SECRET:'❌ サーバー設定エラー（管理者にお問い合わせください）', DEVICE_LIMIT:'❌ このキーはすでに3台で使用中です。\n不要な端末の⚙設定タブ →「別のキーで再認証」で1台解除してから試してください。' };
          err.textContent = msgs[result.code] || '❌ 認証に失敗しました'; err.style.color = '#ff6b6b'; return;
        }
        overlay.remove();
        onSuccess(key, result.token, result.expiry, result.deviceCount);
      });
    });
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') btn.click(); });
    // PCのみ自動フォーカス（スマホでは勝手にキーボードが開くのを防ぐ）
    if (!('ontouchstart' in window)) {
      input.focus();
    }
  }

  // ── 起動処理 ──
  function init() {
    var deviceId = getDeviceId();
    var saved    = loadLicense();
    if (isTokenValid(saved, deviceId)) {
      window._licenseKey = saved.key;
      // 残り30日未満はバックグラウンド更新
      if ((new Date(saved.expiry) - Date.now()) / 86400000 < 30) {
        validateOnServer(saved.key, deviceId).then(function(result) {
          if (result && result.ok) {
            saveLicense({ key: saved.key, device: deviceId, token: result.token, expiry: result.expiry, deviceCount: result.deviceCount, verifiedAt: Date.now() });
            renderLicenseInfo(saved.key, deviceId, result.deviceCount);
          }
        });
      }
      renderLicenseInfo(saved.key, deviceId, saved.deviceCount || null);
      return;
    }
    showLicenseScreen(function(key, token, expiry, deviceCount) {
      saveLicense({ key: key, device: deviceId, token: token, expiry: expiry, deviceCount: deviceCount, verifiedAt: Date.now() });
      window._licenseKey = key;
      renderLicenseInfo(key, deviceId, deviceCount);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

    var swBlob = new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(function(){});
  }
})();
